    <text x="700" y="535" text-anchor="middle" font-family="Georgia, serif" font-size="44" fill="#352716">SILVER RIDGE CELLARS</text>
    <text x="700" y="605" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">BRAND NAME: SILVER RIDGE CELLARS</text>
<text x="700" y="646" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">Red Wine</text>
<text x="700" y="687" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">California</text>
<text x="700" y="728" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">Vintage 2023</text>
<text x="700" y="769" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">13.5% Alc./Vol.</text>
<text x="700" y="810" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">750 mL</text>
<text x="700" y="851" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">Contains sulfites.</text>
<text x="700" y="892" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">Produced and bottled by Silver Ridge Cellars,</text>
<text x="700" y="925" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">Sonoma, CA</text>
<text x="700" y="966" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#231f18">GOVERNMENT WARNING: (1) According to the Surgeon General, women should not drink</text>
<text x="700" y="990" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#231f18">alcoholic beverages during pregnancy because of the risk of birth defects. (2)</text>
<text x="700" y="1014" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#231f18">Consumption of alcoholic beverages impairs your ability to drive a car or operate</text>
<text x="700" y="1038" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#231f18">machinery, and may cause health problems.</text>
    
