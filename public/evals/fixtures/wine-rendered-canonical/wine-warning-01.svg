    <rect x="570" y="165" width="260" height="40" fill="#d1b76b"/>
    <path d="M556 345 C595 384 805 384 844 345 L844 425 C805 463 595 463 556 425 Z" fill="#18170f" opacity="0.55"/>
    <path d="M540 355 C578 392 822 392 860 355" fill="none" stroke="#cab276" stroke-width="9" opacity="0.8"/>
    <rect x="437" y="470" width="526" height="640" rx="26" fill="#f4ead5" stroke="#bda76a" stroke-width="7"/>
    <rect x="459" y="492" width="482" height="596" rx="16" fill="none" stroke="#d5c18a" stroke-width="3"/>
    <text x="700" y="535" text-anchor="middle" font-family="Georgia, serif" font-size="44" fill="#352716">HARBOR GLEN VINEYARDS</text>
    <text x="700" y="605" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">BRAND NAME: HARBOR GLEN VINEYARDS</text>
<text x="700" y="646" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">Table Wine</text>
<text x="700" y="687" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">Oregon</text>
<text x="700" y="728" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">Vintage 2022</text>
<text x="700" y="769" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">750 mL</text>
<text x="700" y="810" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">Contains sulfites.</text>
<text x="700" y="851" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">Produced and bottled by Harbor Glen Vineyards,</text>
<text x="700" y="884" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#231f18">Dundee, OR</text>
<text x="700" y="925" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#231f18">GOVERNMENT WARNING: (1) According to the Surgeon</text>
<text x="700" y="949" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#231f18">General, women should not drink alcoholic</text>
<text x="700" y="973" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#231f18">beverages during pregnancy because of the risk</text>
<text x="700" y="997" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#231f18">of birth defects. (2) Consumption of alcoholic</text>
<text x="700" y="1021" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#231f18">beverages impairs your ability to drive a car or</text>
<text x="700" y="1045" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#231f18">operate machinery, and may cause health</text>
<text x="700" y="1069" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#231f18">problems.</text>
<text x="700" y="1101" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#231f18">Visual note: glare over the Government Warning makes exact statutory punctuation</text>
<text x="700" y="1125" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#231f18">uncertain.</text>
    <path d="M380 710 C520 630 720 650 1030 560 L1030 770 C730 850 520 820 380 930 Z" fill="#fff" opacity="0.62"/>
