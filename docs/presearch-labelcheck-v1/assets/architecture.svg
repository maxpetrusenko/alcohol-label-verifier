<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">LabelCheck V1 architecture</title>
  <desc id="desc">Structured COLA facts and label evidence flow through blind extraction, deterministic rules, reviewer disposition, and audit export.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f3e8"/>
      <stop offset="1" stop-color="#e7f1ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#17332d" flood-opacity=".18"/>
    </filter>
    <style>
      .title{font:700 34px Avenir Next, Verdana, sans-serif;fill:#17332d}
      .label{font:700 18px Avenir Next, Verdana, sans-serif;fill:#17332d}
      .copy{font:500 14px Avenir Next, Verdana, sans-serif;fill:#42534e}
      .small{font:700 12px Avenir Next, Verdana, sans-serif;fill:#f8f3e8;letter-spacing:1px}
      .box{fill:#fffdf8;stroke:#b7c5bc;stroke-width:2;rx:22;filter:url(#shadow)}
      .accent{fill:#14594c}
      .risk{fill:#8d2e2e}
      .arrow{stroke:#14594c;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#14594c"/>
    </marker>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="56" y="70" class="title">Extractor reads. RuleGraph decides. Reviewer closes.</text>
  <text x="58" y="103" class="copy">The model never approves labels and never sees expected facts. It reads label evidence only.</text>

  <g transform="translate(58 155)">
    <rect class="box" width="210" height="140"/>
    <rect class="accent" x="18" y="18" width="72" height="25" rx="12"/>
    <text x="34" y="36" class="small">INPUT</text>
    <text x="22" y="72" class="label">Queue Row</text>
    <text x="22" y="101" class="copy">COLA JSON or CSV</text>
    <text x="22" y="124" class="copy">Attached label image</text>
  </g>
  <path class="arrow" d="M288 225 C332 225 342 225 386 225"/>

  <g transform="translate(400 155)">
    <rect class="box" width="210" height="140"/>
    <rect class="accent" x="18" y="18" width="92" height="25" rx="12"/>
    <text x="34" y="36" class="small">VISION</text>
    <text x="22" y="72" class="label">Extractor</text>
    <text x="22" y="101" class="copy">Observed label only</text>
    <text x="22" y="124" class="copy">Confidence + notes</text>
  </g>
  <path class="arrow" d="M630 225 C674 225 684 225 728 225"/>

  <g transform="translate(742 155)">
    <rect class="box" width="210" height="140"/>
    <rect class="accent" x="18" y="18" width="76" height="25" rx="12"/>
    <text x="35" y="36" class="small">RULES</text>
    <text x="22" y="72" class="label">RuleGraph</text>
    <text x="22" y="101" class="copy">TTB source chips</text>
    <text x="22" y="124" class="copy">Expected vs observed</text>
  </g>
  <path class="arrow" d="M962 225 C1006 225 1016 225 1060 225"/>

  <g transform="translate(58 380)">
    <rect class="box" width="210" height="140"/>
    <rect class="risk" x="18" y="18" width="94" height="25" rx="12"/>
    <text x="33" y="36" class="small">CONTROL</text>
    <text x="22" y="72" class="label">Review Cockpit</text>
    <text x="22" y="101" class="copy">Filter by risk</text>
    <text x="22" y="124" class="copy">Accept or override</text>
  </g>
  <path class="arrow" d="M1060 290 C958 414 402 450 288 450"/>

  <g transform="translate(400 380)">
    <rect class="box" width="210" height="140"/>
    <rect class="accent" x="18" y="18" width="90" height="25" rx="12"/>
    <text x="34" y="36" class="small">EXPORT</text>
    <text x="22" y="72" class="label">Audit Packet</text>
    <text x="22" y="101" class="copy">Checks + citations</text>
    <text x="22" y="124" class="copy">No raw image bytes</text>
  </g>
  <path class="arrow" d="M288 450 C332 450 342 450 386 450"/>

  <g transform="translate(742 380)">
    <rect class="box" width="210" height="140"/>
    <rect class="accent" x="18" y="18" width="86" height="25" rx="12"/>
    <text x="34" y="36" class="small">FUTURE</text>
    <text x="22" y="72" class="label">Batch Queue</text>
    <text x="22" y="101" class="copy">For 200 to 300 labels</text>
    <text x="22" y="124" class="copy">Not required for V1</text>
  </g>
  <path class="arrow" d="M630 450 C674 450 684 450 728 450"/>

  <g transform="translate(1032 178)">
    <circle cx="54" cy="47" r="42" fill="#14594c"/>
    <text x="34" y="43" class="small">NO</text>
    <text x="22" y="62" class="small">AUTO</text>
    <text x="13" y="81" class="small">APPROVAL</text>
  </g>
</svg>
